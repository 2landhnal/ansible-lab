- name: Install redis-sentinel
  apt:
    name: redis-sentinel
    state: present
    update_cache: yes

- name: Check version
  command: redis-sentinel --version

- name: Configure sentinel
  template:
    src: sentinel.conf.j2
    dest: /etc/redis/sentinel.conf
  notify: Restart sentinel

- name: Enable sentinel
  service:
    name: redis-sentinel
    enabled: yes
    state: started
